# ── HikariCP Connection Pool ──────────────────────────────────────────────────
# Default HikariCP cuma 10 koneksi — fatal untuk 50 concurrent VU.
# Setiap VU butuh koneksi saat login, fetch, dan create secara bersamaan.
# Naikkan ke 50 agar tidak ada VU yang antri menunggu koneksi.
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=MoodyStudyPool

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
# DIMATIKAN: show-sql=true menulis setiap query SQL ke log — overhead I/O
# signifikan saat 50 VU bombardir backend dengan ratusan request per detik.
spring.jpa.show-sql=false

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

